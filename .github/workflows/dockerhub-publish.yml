name: Build and push Docker Hub image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag to publish
        required: true
        default: v1.4

env:
  IMAGE_NAME: pinkmoone/open_webui

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          build-args: |
            USE_SLIM=true
            APK_REPOSITORY_MIRROR=https://mirrors.aliyun.com/alpine
            DEBIAN_MIRROR=https://mirrors.aliyun.com/debian
            DEBIAN_SECURITY_MIRROR=https://mirrors.aliyun.com/debian-security
            NPM_REGISTRY=https://registry.npmmirror.com
            PIP_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple/
            UV_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple/
            TORCH_CPU_INDEX_URL=https://pypi.tuna.tsinghua.edu.cn/simple/
            PYODIDE_PYPI_JSON_BASE_URL=https://pypi.tuna.tsinghua.edu.cn/pypi
            PYODIDE_PYPI_FILE_BASE_URL=https://pypi.tuna.tsinghua.edu.cn
