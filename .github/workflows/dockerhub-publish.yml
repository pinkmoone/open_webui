name: Build and push Docker Hub image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag to publish
        required: true
        default: v1.4

env:
  IMAGE_NAME: pinkmoone/open_webui

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          build-args: |
            USE_SLIM=true
            APK_REPOSITORY_MIRROR=
            DEBIAN_MIRROR=
            DEBIAN_SECURITY_MIRROR=
            NPM_REGISTRY=https://registry.npmjs.org
            PIP_INDEX_URL=https://pypi.org/simple/
            UV_INDEX_URL=https://pypi.org/simple/
            TORCH_CPU_INDEX_URL=https://download.pytorch.org/whl/cpu
            PYODIDE_PYPI_JSON_BASE_URL=https://pypi.org/pypi
            PYODIDE_PYPI_FILE_BASE_URL=https://files.pythonhosted.org
